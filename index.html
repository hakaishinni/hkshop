<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK SHOP | Assinaturas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #050505; color: #ffffff; padding: 20px 10px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; color: #D4AF37; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; }
        .verified-badge { background-color: #D4AF37; color: #000; font-size: 0.7rem; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; margin-left: 8px; font-weight: 900; }
        
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 1100px; margin: 0 auto; }
        .product-card { background-color: #121212; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #2a2a2a; }
        
        /* Ajuste da imagem */
        .product-img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; }
        
        .title { font-size: 0.85rem; font-weight: 800; margin-bottom: 5px; color: #fff; }
        .price { font-size: 0.95rem; font-weight: 800; color: #D4AF37; margin-bottom: 8px; }
        .description { color: #aaa; font-size: 0.6rem; margin-bottom: 10px; line-height: 1.3; }
        
        .pay-btn { background: linear-gradient(135deg, #D4AF37 0%, #AA8529 100%); color: #000; border: none; width: 100%; padding: 8px; font-weight: 800; border-radius: 4px; cursor: pointer; font-size: 0.65rem; margin-bottom: 5px; text-transform: uppercase; }
        .whatsapp-btn { background: #25d366; color: #fff; width: 100%; padding: 6px; border-radius: 4px; text-decoration: none; display: block; font-weight: 600; font-size: 0.6rem; }
    </style>
</head>
<body>

    <div class="header">

            <button class="pay-btn" onclick="window.location.href='https://invoice.infinitepay.io/plans/isaac-newton-004/i2HBkkM24L'">Pagar Cartão/Pix</button>

    </div>

    <script>
        function copiarPix(btn, codigo) {
            navigator.clipboard.writeText(codigo);
            btn.innerText = "Copiado!";
            setTimeout(() => btn.innerText = "Copiar Pix", 3000);
        }
    </script>

</html>
