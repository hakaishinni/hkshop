<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Premium | Suporte 24h</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #050505; color: #ffffff; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 2rem; color: #D4AF37; text-transform: uppercase; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .product-card { background-color: #121212; border-radius: 16px; padding: 30px; text-align: center; border: 1px solid #2a2a2a; }
        .title { font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; }
        .price { font-size: 1.8rem; font-weight: 800; color: #D4AF37; margin-bottom: 15px; }
        .pay-btn { background: linear-gradient(135deg, #D4AF37 0%, #AA8529 100%); color: #000; border: none; width: 100%; padding: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .whatsapp-btn { background: #25d366; color: #fff; width: 100%; padding: 12px; border-radius: 8px; text-decoration: none; display: block; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Loja Premium</h1>
        <p>Escolha seu plano e envie o comprovante no WhatsApp</p>
    </div>

    <div class="products-grid">
        <!-- Produtos com Link -->
        <div class="product-card">
            <h2 class="title">Netflix 4K</h2>
            <div class="price">R$ 25,00</div>
            <button class="pay-btn" onclick="window.location.href='https://invoice.infinitepay.io/plans/isaac-newton-004/FYx6kGjE4c'">Pagar Cartão/Boleto</button>
            <a href="https://wa.me/5585996283171?text=Olá, realizei o pagamento da Netflix 4K. Segue meu comprovante:" class="whatsapp-btn">Enviar Comprovante (WhatsApp)</a>
        </div>

        <!-- Produtos com PIX -->
        <div class="product-card">
            <h2 class="title">CapCut Pro</h2>
            <div class="price">R$ 10,00</div>
            <button class="pay-btn" onclick="copiarPix(this, '00020101021226720014BR.GOV.BCB.PIX0124isaac-newton-004@jim.com0222Pagamento isaac-newton520400005303986540510.005802BR5924ISAAC NEWTON GOMES PINTO6009PARAIPABA62290525QRCC9wDIrF72dIRa1iVecR3ob6304B9AC')">Copiar Pix e Pagar</button>
            <a href="https://wa.me/5585996283171?text=Olá, realizei o PIX do CapCut Pro. Segue meu comprovante:" class="whatsapp-btn">Enviar Comprovante (WhatsApp)</a>
        </div>
    </div>

    <script>
        function copiarPix(btn, codigo) {
            navigator.clipboard.writeText(codigo);
            btn.innerText = "Pix Copiado!";
            setTimeout(() => btn.innerText = "Copiar Pix e Pagar", 3000);
        }
    </script>
</body>
</html>
